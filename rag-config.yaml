# RAG MCP Server Configuration
# All values below are defaults — uncomment and modify as needed.

# Path to the knowledge directory containing category folders with markdown files.
# Resolved relative to this config file's location.
knowledge_dir: "C:\\Users\\UserName\\Documents\\knowledge"

# Path to the data directory for SQLite and LanceDB storage.
# Resolved relative to this config file's location.
# data_dir: ./data

# Web interface settings
# web:
